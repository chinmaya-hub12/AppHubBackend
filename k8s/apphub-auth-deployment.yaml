apiVersion: apps/v1
kind: Deployment
metadata:
  name: apphub-auth-service
  namespace: apphub
  labels:
    app: apphub-auth-service
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apphub-auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: apphub-auth-service
        version: "1.0"
    spec:
      containers:
        - name: apphub-auth-service
          image: YOUR_ACR_NAME.azurecr.io/apphub-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: apphub-config
            - secretRef:
                name: apphub-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: apphub-auth-svc
  namespace: apphub
  labels:
    app: apphub-auth-service
spec:
  selector:
    app: apphub-auth-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
