apiVersion: v1
kind: Secret
metadata:
  name: apphub-secrets
  namespace: apphub
type: Opaque
stringData:
  # ── Only the Key Vault URI lives here in production ──────────────────────────
  # Everything else is loaded FROM Key Vault at startup via DefaultAzureCredential.
  # In AKS, attach a Managed Identity — no credentials needed at all.
  KeyVault__VaultUri: "https://YOUR-KEYVAULT-NAME.vault.azure.net/"

  # ── Local dev fallbacks (delete in production, use Key Vault instead) ────────
  ConnectionStrings__DefaultConnection: "Server=164.164.122.110;Database=AppHub;User Id=sa;Password=Admin2022$#;MultipleActiveResultSets=true;TrustServerCertificate=True"
  IdentityServerSettings__ApiSecret: "chin8#56&opD4&jsfbcv*@gd6^85%&#$lps%G^$jydt$yd6%##"
  CosmosDb__AccountKey: "YOUR_COSMOS_PRIMARY_KEY"
  BlobStorage__ConnectionString: "DefaultEndpointsProtocol=https;AccountName=YOUR_ACCOUNT;AccountKey=YOUR_KEY;EndpointSuffix=core.windows.net"
  BlobStorage__AccountKey: "YOUR_STORAGE_KEY"
  AzureAd__TenantId: "YOUR_TENANT_ID"
  AzureAd__ClientId: "YOUR_CLIENT_ID"
  AzureAd__ClientSecret: "YOUR_CLIENT_SECRET"
  AzureCommunicationServices__ConnectionString: "endpoint=https://YOUR_ACS.communication.azure.com/;accesskey=YOUR_ACCESS_KEY"
