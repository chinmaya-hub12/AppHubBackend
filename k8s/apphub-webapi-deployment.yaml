apiVersion: apps/v1
kind: Deployment
metadata:
  name: apphub-webapi
  namespace: apphub
  labels:
    app: apphub-webapi
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apphub-webapi
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: apphub-webapi
        version: "1.0"
    spec:
      containers:
        - name: apphub-webapi
          image: YOUR_ACR_NAME.azurecr.io/apphub-webapi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: apphub-config
            - secretRef:
                name: apphub-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: apphub-webapi-svc
  namespace: apphub
  labels:
    app: apphub-webapi
spec:
  selector:
    app: apphub-webapi
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
